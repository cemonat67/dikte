<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-state="preserved">
  
  <div class="top-bar">
    <div class="logo">ZERO@TRUST</div>
    <div class="top-meta">
       <div class="meta-item with-dot">
         <div class="dot-container">
           <div class="dot"></div>
           <div class="dot-line"></div>
         </div>
         <div class="meta-text">
           <div class="label">CONTINUITY</div>
           <div class="value">Preserved.</div>
         </div>
       </div>
       <div class="meta-item">
         <div class="label">TIME</div>
         <div class="value clock-value" id="clock">14:32 UTC</div>
       </div>
       <div class="meta-item">
         <div class="label">ENVIRONMENT</div>
         <div class="value">Production.</div>
       </div>
       <div class="meta-item control-item">
         <div class="control-circle"><div class="inner-dot"></div></div>
         <div class="value">Human Control.</div>
       </div>
    </div>
  </div>

  <div class="center-stage">
    <div class="center-content">
      <div class="center-label">OPERATIONAL TRUST</div>
      <div class="center-value">Preserved.</div>
      <div class="center-glow-line"></div>
      <div class="silent-drilldown" id="drilldown-text">Continuity.</div>
    </div>
    
    <div class="right-panel">
      <div class="right-panel-line"></div>
      <div class="right-panel-content">
        <span>Continuity Intact.</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
      <div class="right-panel-line"></div>
    </div>
  </div>

  </div>

  <div class="bottom-bar">
    <div class="archival-trace" id="archival-trace">Continuity.</div>
  </div>

  <!-- Trust Event Surface -->
  <div class="trust-event-surface" id="trust-event-surface">
    <div class="te-title">Identity Uncertainty</div>
    <div class="te-statement">Confidence parameter unmet.</div>
    <div class="te-recommendation">Verification recommended.</div>
    <div class="te-action-row">
      <button class="te-cta" id="te-cta">Request Verification.</button>
      <div class="te-state">Constrained.</div>
    </div>
    <div class="te-feedback" id="te-feedback">Human control registered. Returning to intact state.</div>
  </div>

  <!-- Hidden Operator Control (Double-click to trigger) -->
  <div class="demo-trigger" id="demo-trigger" title="Double click for Trust Event Demo"></div>

  <script src="script.js"></script>
</body>
</html>
