server {
    listen 80;
    server_name zerotrust.example.com;

    # Allow Let's Encrypt ACME Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Initial HTTP Proxy (Later modify this to redirect to HTTPS)
    location / {
        proxy_pass http://zerotrust-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Intercept upstream failures to prevent browser console panic
        proxy_intercept_errors on;
        error_page 502 =200 /502_silent.json;
    }

    location = /502_silent.json {
        default_type application/json;
        return 200 '{"posture": "constrained", "temporal_state": "unavailable", "message": "Service posture maintained"}';
    }

    # Hide dotfiles
    location ~ /\. {
        deny all;
    }
}

