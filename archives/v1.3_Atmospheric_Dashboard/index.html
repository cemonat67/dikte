<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero@Trust — Operational Surface</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-state="stable">
  
  <div class="top-bar">
    <div class="logo">ZERO@TRUST</div>
    <div class="top-meta">
       <div class="meta-item with-dot">
         <div class="dot-container">
           <div class="dot"></div>
           <div class="dot-line"></div>
         </div>
         <div class="meta-text">
           <div class="label">SYSTEM CONTINUITY</div>
           <div class="value">Stable</div>
         </div>
       </div>
       <div class="meta-item">
         <div class="label">OPERATIONAL TIME</div>
         <div class="value clock-value" id="clock">14:32:18 UTC</div>
       </div>
       <div class="meta-item">
         <div class="label">ENVIRONMENT</div>
         <div class="value">Production</div>
       </div>
       <div class="meta-item control-item">
         <div class="control-circle"><div class="inner-dot"></div></div>
         <div class="value">Human in Control</div>
       </div>
    </div>
  </div>

  <div class="center-stage">
    <div class="center-content">
      <div class="center-label">OPERATIONAL TRUST</div>
      <div class="center-value">Stable</div>
      <div class="center-glow-line"></div>
    </div>
    
    <div class="right-panel">
      <div class="right-panel-line"></div>
      <div class="right-panel-content">
        <span>All systems nominal</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </div>
      <div class="right-panel-line"></div>
    </div>
  </div>

  <div class="bottom-kpi">
    <div class="kpi-item">
      <div class="label">CONTINUITY</div>
      <div class="value">Preserved <div class="blue-dot"></div></div>
    </div>
    <div class="kpi-divider"></div>
    <div class="kpi-item">
      <div class="label">VALIDATION PRESSURE</div>
      <div class="value">Minimal <div class="blue-dot"></div></div>
    </div>
    <div class="kpi-divider"></div>
    <div class="kpi-item">
      <div class="label">SILENT SIGNALS</div>
      <div class="value">Monitoring <div class="blue-dot"></div></div>
    </div>
    <div class="kpi-divider"></div>
    <div class="kpi-item">
      <div class="label">HUMAN REVIEW</div>
      <div class="value">Clear <div class="blue-dot"></div></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="context-btn">
      <div class="circle">?</div>
      <span>Context</span>
    </div>
    <div class="slider-container">
      <span>Calm</span>
      <div class="slider-track">
        <div class="slider-knob"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
