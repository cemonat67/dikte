version: '3.8'

services:
  zerotrust-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://zerotrust:zerotrust@postgres:5432/zerotrust
      - ADMIN_API_KEY=change-me-before-production
      - TRUST_TICK_SECONDS=10
      - CORS_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=zerotrust
      - POSTGRES_PASSWORD=zerotrust
      - POSTGRES_DB=zerotrust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
